<!DOCTYPE html>
<html>
<head>
    <title>Empty Table Layout</title>
</head>
<body>

<h2 align="center">Empty Table Layout</h2>

<table border="2" width="800" height="500" align="center" cellspacing="0" cellpadding="10">

    <!-- First Row -->
    <tr>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
    </tr>

    <!-- Second Row -->
    <tr>
        <td colspan="5"></td>
    </tr>

    <!-- Third Row -->
    <tr>
        <td colspan="2" rowspan="2"></td>
        <td colspan="3"></td>
    </tr>

    <!-- Fourth Row -->
    <tr>
        <td colspan="3"></td>
    </tr>

    <!-- fifth Row -->
    <tr>
        <td colspan="5"></td>
    </tr>

    <!-- sixth row -->
    <tr>
        <td rowspan="3"></td>
        <td></td>
        <td></td>
        <td rowspan="3"></td>
        <td></td>
    </tr>

    <tr>
        <td colspan="2"></td>
        <td></td>
    </tr>

    <tr>
        <td colspan="2"></td>
        <td></td>
    </tr>

    <!-- seventh Row -->
    <tr>
        <td colspan="5"></td>
    </tr>

</table>

</body>
</html>
